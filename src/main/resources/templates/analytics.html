<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Analytics</title>
<div th:replace="~{fragments/base :: assetsHead}"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body { height:100%; }
body { display:flex; flex-direction:column; }
.main-content { flex:1; }
</style>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">

<div class="container mt-5">

<h1 class="text-center mb-4">Inventory Analytics</h1>

<div class="row justify-content-center">

<div class="col-md-6">
<div class="card shadow">
<div class="card-body">
<h5 class="text-center">Inventory by Center</h5>
<canvas id="centerChart"></canvas>
</div>
</div>
</div>

<div class="col-md-6">
<div class="card shadow">
<div class="card-body">
<h5 class="text-center">Products by Category</h5>
<canvas id="categoryChart"></canvas>
</div>
</div>
</div>

</div>

</div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/base :: assetsScripts}"></div>

<script>

const centerChart = new Chart(
document.getElementById('centerChart'),
{
type: 'bar',
data: {
labels: ['Center A','Center B','Center C'],
datasets: [{
label: 'Inventory',
data: [120,90,150],
backgroundColor: ['#0d6efd','#198754','#ffc107']
}]
}
});

const categoryChart = new Chart(
document.getElementById('categoryChart'),
{
type: 'pie',
data: {
labels: ['Electronics','Clothing','Food'],
datasets: [{
data: [45,30,25],
backgroundColor: ['#0d6efd','#198754','#ffc107']
}]
}
});

</script>

</body>
</html>
