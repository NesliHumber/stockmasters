<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Product</title>

<div th:replace="fragments/base :: assetsHead"></div>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid" style="margin-left:250px;padding:30px;">

<h2 class="mb-4">Add Product</h2>

<div class="card shadow">

<div class="card-body">

<form th:action="@{/products/save}" th:object="${product}" method="post">

<div class="mb-3">

<label class="form-label">Product Name</label>

<input type="text" th:field="*{name}" class="form-control" required>

</div>

<button class="btn btn-primary">Save Product</button>

<a th:href="@{/products}" class="btn btn-secondary">Cancel</a>

</form>

</div>

</div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<div th:replace="fragments/base :: assetsScripts"></div>

</body>

</html>
