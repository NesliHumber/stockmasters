<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Edit Product</title>

<div th:replace="fragments/base :: assetsHead"></div>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid" style="margin-left:250px;padding:30px;">

<h2 class="mb-4">Edit Product</h2>

<div class="card shadow">

<div class="card-body">

<form th:action="@{/products/update}" th:object="${product}" method="post">

<input type="hidden" th:field="*{id}">

<div class="mb-3">

<label class="form-label">Product Name</label>

<input type="text" th:field="*{name}" class="form-control">

</div>

<button class="btn btn-success">Update Product</button>

<a th:href="@{/products}" class="btn btn-secondary">Cancel</a>

</form>

</div>

</div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<div th:replace="fragments/base :: assetsScripts"></div>

</body>

</html>
