<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ✅ NORMAL NAVBAR ONLY -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <!-- ✅ DASHBOARD BUTTON -->
    <a href="/admin/dashboard" class="btn btn-dark mb-3">🏠 Admin Dashboard</a>

    <div class="card shadow p-4">

        <h2 class="mb-4">✏️ Edit User</h2>

        <form th:action="@{/admin/users/edit/{id}(id=${user.id})}" method="post">

            <div class="mb-3">
                <label class="form-label">User ID</label>
                <input type="text" th:value="${user.id}" class="form-control" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" th:value="${user.username}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Role</label>
                <select name="role" class="form-select">
                    <option value="ROLE_ADMIN" th:selected="${user.role == 'ROLE_ADMIN'}">Admin</option>
                    <option value="ROLE_STAFF" th:selected="${user.role == 'ROLE_STAFF'}">Staff</option>
                    <option value="ROLE_VIEWER" th:selected="${user.role == 'ROLE_VIEWER'}">Viewer</option>
                </select>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/admin/users" class="btn btn-secondary">⬅ Back</a>
                <button type="submit" class="btn btn-primary">Update User</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
