<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ✅ ONLY ONE NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <!-- ✅ DASHBOARD BUTTON -->
    <a href="/admin/dashboard" class="btn btn-dark mb-3">🏠 Admin Dashboard</a>

    <h1 class="mb-4">User Management</h1>

    <a href="/admin/users/add" class="btn btn-primary mb-3">+ Add User</a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.role}"></td>
                <td>
                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" 
                       class="btn btn-warning btn-sm">Edit</a>

                    <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
