<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Suppliers</title>
    <div th:replace="~{fragments/base :: assetsHead}"></div>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-content">
    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Suppliers</h2>
            <a class="btn btn-success" th:href="@{/suppliers/new}">Add Supplier</a>
        </div>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Company</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="s : ${suppliers}">
                <td th:text="${s.name}"></td>
                <td th:text="${s.company}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.phone}"></td>
                <td>
                    <a class="btn btn-sm btn-warning"
                       th:href="@{/suppliers/edit/{id}(id=${s.supplierId})}">
                        Edit
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(suppliers)}">
                <td colspan="5" class="text-center">No suppliers found</td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/base :: assetsScripts}"></div>

</body>
</html>
