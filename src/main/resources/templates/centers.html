<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Centers</title>

<div th:replace="fragments/base :: assetsHead"></div>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid" style="margin-left:250px;padding:30px;">

<h2 class="mb-4">Distribution Centers</h2>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Location</th>

</tr>

</thead>

<tbody>

<tr th:each="center : ${centers}">

<td th:text="${center.id}"></td>
<td th:text="${center.name}"></td>
<td th:text="${center.location}"></td>

</tr>

</tbody>

</table>

</div>

<div th:replace="fragments/footer :: footer"></div>

<div th:replace="fragments/base :: assetsScripts"></div>

</body>

</html>
