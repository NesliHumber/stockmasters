<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Centers</title>

<div th:replace="fragments/base :: assetsHead"></div>

<style>
html, body { height:100%; }
body { display:flex; flex-direction:column; }
.main-content { flex:1; }
</style>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">

<div class="container mt-5">

<h1 class="text-center mb-4">Distribution Centers</h1>

<div class="row justify-content-center">
<div class="col-md-8">

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>City</th>
<th>State</th>
</tr>

</thead>

<tbody>

<tr th:each="center : ${centers}">

<td th:text="${center.centerId}"></td>
<td th:text="${center.name}"></td>
<td th:text="${center.city}"></td>
<td th:text="${center.state}"></td>

</tr>

</tbody>

</table>

</div>
</div>

</div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<div th:replace="fragments/base :: assetsScripts"></div>

</body>
</html>
