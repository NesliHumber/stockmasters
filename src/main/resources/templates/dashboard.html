<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>
html, body { height:100%; }
body { display:flex; flex-direction:column; }
.main-content { flex:1; }
</style>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">

<div class="container mt-4">

<h1 class="mb-4">Dashboard</h1>

<div class="row">

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5 class="card-title">Products</h5>
<h2 th:text="${totalProducts}">0</h2>
<a class="btn btn-primary mt-2" th:href="@{/products}">View Products</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5 class="card-title">Inventory Records</h5>
<h2 th:text="${totalInventory}">0</h2>
<a class="btn btn-primary mt-2" th:href="@{/inventory}">View Inventory</a>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5 class="card-title">Distribution Centers</h5>
<h2 th:text="${totalCenters}">0</h2>
<a class="btn btn-primary mt-2" th:href="@{/centers}">View Centers</a>
</div>
</div>
</div>

</div>

</div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
