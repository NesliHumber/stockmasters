<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Products</title>
<div th:replace="fragments/base :: assetsHead"></div>
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-3">
<h2>Products</h2>

<a class="btn btn-success" th:href="@{/products/new}">
Add Product
</a>
</div>

<form method="get" class="row g-2 mb-4">

<div class="col-md-4">
<select name="brand" class="form-select">
<option value="">All Brands</option>
<option th:each="b : ${brands}"
        th:value="${b.brandId}"
        th:text="${b.name}"
        th:selected="${selectedBrand != null and selectedBrand == b.brandId}">
</option>
</select>
</div>

<div class="col-md-4">
<select name="category" class="form-select">
<option value="">All Categories</option>
<option th:each="c : ${categories}"
        th:value="${c.categoryId}"
        th:text="${c.name}"
        th:selected="${selectedCategory != null and selectedCategory == c.categoryId}">
</option>
</select>
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100">
Filter
</button>
</div>

</form>

<table class="table table-striped table-bordered">

<thead class="table-dark">
<tr>

<th>
<a th:href="@{/products(sort='name',
direction=${sort=='name' and direction=='asc'?'desc':'asc'},
page=${products.number}, brand=${selectedBrand?.brandId}, category=${selectedCategory?.categoryId})}"
class="text-white text-decoration-none">
Name
</a>
</th>

<th>
<a th:href="@{/products(sort='price',
direction=${sort=='price' and direction=='asc'?'desc':'asc'},
page=${products.number},brand=${selectedBrand?.brandId},category=${selectedCategory?.categoryId})}"
class="text-white text-decoration-none">
Price
</a>
</th>

<th>
<a th:href="@{/products(sort='quantity',
direction=${sort=='quantity' and direction=='asc'?'desc':'asc'},
page=${products.number},brand=${selectedBrand?.brandId},category=${selectedCategory?.categoryId})}"
class="text-white text-decoration-none">
Quantity
</a>
</th>

<th>
<a th:href="@{/products(sort='brand.name',
direction=${sort=='brand.name' and direction=='asc'?'desc':'asc'},
page=${products.number},brand=${selectedBrand?.brandId}, category=${selectedCategory?.categoryId})}"
class="text-white text-decoration-none">
Brand
</a>
</th>

<th>
<a th:href="@{/products(sort='category.name',
direction=${sort=='category.name' and direction=='asc'?'desc':'asc'},
page=${products.number},brand=${selectedBrand?.brandId},category=${selectedCategory?.categoryId})}"
class="text-white text-decoration-none">
Category
</a>
</th>

</tr>
</thead>
<tbody>

<tr th:each="p : ${products.content}">
<td th:text="${p.name}"></td>
<td th:text="${p.price}"></td>
<td th:text="${p.quantity}"></td>
<td th:text="${p.brand.name}"></td>
<td th:text="${p.category.name}"></td>
</tr>

<tr th:if="${products.totalElements == 0}">
<td colspan="5" class="text-center">
No products found
</td>
</tr>

</tbody>
</table>

<nav>
<ul class="pagination">

<li class="page-item" th:classappend="${products.first}? 'disabled'">
<a class="page-link"
th:href="@{/products(page=${products.number - 1})}">
Previous
</a>
</li>

<li class="page-item" th:classappend="${products.last}? 'disabled'">
<a class="page-link"
th:href="@{/products(page=${products.number + 1})}">
Next
</a>
</li>

</ul>
</nav>

</div>

</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/base :: assetsScripts"></div>

</body>
</html>
