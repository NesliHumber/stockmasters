<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Products</title>

<div th:replace="fragments/base :: assetsHead"></div>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid" style="margin-left:250px;padding:30px;">

<h2 class="mb-4">Products</h2>

<!-- ADD PRODUCT BUTTON -->

<a th:href="@{/products/new}" class="btn btn-primary mb-3">
Add Product
</a>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Actions</th>

</tr>

</thead>

<tbody>

<tr th:each="product : ${products}">

<td th:text="${product.id}"></td>

<td th:text="${product.name}"></td>

<td>

<!-- EDIT BUTTON -->

<a th:href="@{/products/edit/{id}(id=${product.id})}"
class="btn btn-warning btn-sm">

Edit

</a>

<!-- DELETE BUTTON -->

<a th:href="@{/products/delete/{id}(id=${product.id})}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

</tbody>

</table>

</div>

<div th:replace="fragments/footer :: footer"></div>

<div th:replace="fragments/base :: assetsScripts"></div>

</body>

</html>
