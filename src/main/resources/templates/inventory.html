<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Inventory</title>

<div th:replace="fragments/base :: assetsHead"></div>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid" style="margin-left:250px;padding:30px;">

<h2 class="mb-4">Inventory</h2>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>

<th>Product</th>
<th>Center</th>
<th>Quantity</th>

</tr>

</thead>

<tbody>

<tr th:each="item : ${inventory}">

<td th:text="${item.product.name}"></td>
<td th:text="${item.center.name}"></td>
<td th:text="${item.quantity}"></td>

</tr>

</tbody>

</table>

</div>

<div th:replace="fragments/footer :: footer"></div>

<div th:replace="fragments/base :: assetsScripts"></div>

</body>

</html>
