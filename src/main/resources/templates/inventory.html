<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Inventory</title>

<div th:replace="fragments/base :: assetsHead"></div>

<style>

html, body {
height: 100%;
}

body {
display: flex;
flex-direction: column;
}

.main-content {
flex: 1;
}

</style>

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="main-content">

<div class="container mt-5">

<h2 class="mb-4 text-center">Inventory</h2>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>
<th>Product</th>
<th>Center</th>
<th>Quantity</th>
<th>Unit Price</th>
<th>Inventory Value</th>
</tr>

</thead>

<tbody>

<tr th:each="item : ${inventory}">

<td th:text="${item.product.name}"></td>

<td th:text="${item.center.name}"></td>

<td th:text="${item.quantity}"></td>

<td>$<span th:text="${item.product.price}"></span></td>

<td>$<span th:text="${item.quantity * item.product.price}"></span></td>

</tr>

</tbody>

<tfoot>

<tr class="table-secondary">

<td colspan="4"><strong>Total Inventory Value</strong></td>

<td>
<strong>$<span th:text="${totalValue}"></span></strong>
</td>

</tr>

</tfoot>

</table>

</div>

</div>

<div th:replace="fragments/footer :: footer"></div>

<div th:replace="fragments/base :: assetsScripts"></div>

</body>
</html>
