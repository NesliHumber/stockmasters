<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark"
     th:fragment="navbar">

<div class="container-fluid">

<a class="navbar-brand" th:href="@{/}">
StockMasters
</a>

<ul class="navbar-nav">

<li class="nav-item">
<a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/products}">Products</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/suppliers}">Suppliers</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/inventory}">Inventory</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/centers}">Centers</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/analytics}">Analytics</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/register}" sec:authorize="isAnonymous()">
    Register
</a>
</li>

</ul>

<div class="d-flex align-items-center ms-auto">

<span class="text-light me-3" sec:authorize="isAuthenticated()">
     Logged in as: <span sec:authentication="name"></span>
     </span>

<form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
     <button class="btn btn-outline-light" type="submit">Logout</button>
     </form>

</div>

</div>

</nav>

</body>
</html>
