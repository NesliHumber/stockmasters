<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        html, body { height:100%; }
        body { display:flex; flex-direction:column; }
        .main-content { flex:1; }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main-content">
<div class="container mt-4">

<a href="/admin/dashboard" class="btn btn-dark mb-3">🏠 Admin Dashboard</a>

<div class="row">

    <!-- USERS -->
    <div class="col-md-4">
        <div class="card text-center shadow border-danger">
            <div class="card-body">
                <h5 class="card-title">Users</h5>
                <h2 th:text="${totalUsers}">0</h2>
                <a class="btn btn-danger mt-2" th:href="@{/admin/users}">Manage Users</a>
            </div>
        </div>
    </div>

    <!-- PRODUCTS -->
    <div class="col-md-4">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Products</h5>
                <a class="btn btn-primary mt-2" th:href="@{/products}">View Products</a>
            </div>
        </div>
    </div>

    <!-- INVENTORY -->
    <div class="col-md-4">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Inventory</h5>
                <a class="btn btn-primary mt-2" th:href="@{/inventory}">View Inventory</a>
            </div>
        </div>
    </div>

</div>

</div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
